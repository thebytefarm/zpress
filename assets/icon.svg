<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <style>
      .text { font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace; }
      .brand { fill: #60a5fa; }
    </style>
  </defs>

  <!-- Rounded square background (terminal color) -->
  <rect width="512" height="512" rx="32" ry="32" fill="#1e1e2e" />

  <!-- Z from the ASCII art logo, centered -->
  <g transform="translate(256, 256)" text-anchor="middle">
    <text class="text brand" font-size="52" y="-100" xml:space="preserve">███████╗</text>
    <text class="text brand" font-size="52" y="-36" xml:space="preserve">╚══███╔╝</text>
    <text class="text brand" font-size="52" y="28" xml:space="preserve">  ███╔╝ </text>
    <text class="text brand" font-size="52" y="92" xml:space="preserve"> ███╔╝  </text>
    <text class="text brand" font-size="52" y="156" xml:space="preserve">███████╗</text>
    <text class="text brand" font-size="52" y="220" xml:space="preserve">╚══════╝</text>
  </g>
</svg>
