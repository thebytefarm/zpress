<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 510">
  <defs>
    <style>
      .terminal-bg { fill: #1e1e2e; }
      .terminal-border { fill: #313244; }
      .title-bar { fill: #181825; }
      .btn-red { fill: #f38ba8; }
      .btn-yellow { fill: #f9e2af; }
      .btn-green { fill: #a6e3a1; }
      .text { font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace; }
      .command { fill: #cdd6f4; }
      .brand { fill: #60a5fa; }
      .green { fill: #a6e3a1; }
      .dim { fill: #6c7086; }
      .white { fill: #cdd6f4; }
      .prompt { fill: #89b4fa; }
    </style>
  </defs>

  <!-- Window frame -->
  <rect class="terminal-border" width="1120" height="510" rx="12"/>
  <rect class="terminal-bg" x="1" y="1" width="1118" height="508" rx="11"/>

  <!-- Title bar -->
  <rect class="title-bar" x="1" y="1" width="1118" height="48" rx="11"/>

  <!-- Window buttons -->
  <circle class="btn-red" cx="28" cy="25" r="7"/>
  <circle class="btn-yellow" cx="52" cy="25" r="7"/>
  <circle class="btn-green" cx="76" cy="25" r="7"/>

  <!-- Title -->
  <text x="560" y="25" text-anchor="middle" dominant-baseline="central" class="text dim" font-size="13">zpress</text>

  <!-- Content area -->
  <g transform="translate(32, 88)">
    <!-- Prompt line -->
    <text class="text prompt" font-size="15" y="0">~</text>
    <text class="text dim" font-size="15" x="16" y="0">$</text>
    <text class="text command" font-size="15" x="36" y="0">zpress build</text>

    <!-- ZPRESS ASCII art -->
    <text class="text brand" font-size="13" y="40" xml:space="preserve">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó</text>
    <text class="text brand" font-size="13" y="56" xml:space="preserve">‚ēö‚ēź‚ēź‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēź‚ēĚ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēź‚ēĚ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēź‚ēĚ</text>
    <text class="text brand" font-size="13" y="72" xml:space="preserve">  ‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó  ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó</text>
    <text class="text brand" font-size="13" y="88" xml:space="preserve"> ‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ  ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēĚ ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēĚ  ‚ēö‚ēź‚ēź‚ēź‚ēź‚Ėą‚Ėą‚ēĎ‚ēö‚ēź‚ēź‚ēź‚ēź‚Ėą‚Ėą‚ēĎ</text>
    <text class="text brand" font-size="13" y="104" xml:space="preserve">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ     ‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ</text>
    <text class="text brand" font-size="13" y="120" xml:space="preserve">‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ‚ēö‚ēź‚ēĚ     ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ</text>

    <!-- Version and description -->
    <text class="text white" font-size="15" y="156">  zpress <tspan class="dim">v0.1.0</tspan></text>
    <text class="text white" font-size="15" y="180">  Making "I vibe-coded it and it works on my machine" look professional.</text>

    <!-- Build output -->
    <text class="text" font-size="15" y="220"><tspan class="green">  &#x2713;</tspan><tspan class="white"> Loaded config</tspan></text>
    <text class="text" font-size="15" y="244"><tspan class="green">  &#x2713;</tspan><tspan class="white"> Synced documents</tspan></text>
    <text class="text" font-size="15" y="268"><tspan class="green">  &#x2713;</tspan><tspan class="white"> Generated sidebar &amp; nav</tspan></text>

    <!-- Done message -->
    <text class="text" font-size="15" y="304"><tspan class="green">  Done!</tspan><tspan class="white"> Run </tspan><tspan class="brand">zpress --help</tspan><tspan class="white"> to learn more.</tspan></text>

    <!-- New prompt -->
    <text class="text prompt" font-size="15" y="344">~</text>
    <text class="text dim" font-size="15" x="16" y="344">$</text>
    <text class="text white" font-size="15" x="36" y="344">&#x2588;</text>
  </g>
</svg>
